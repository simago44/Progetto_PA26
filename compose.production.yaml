services:
  db:
    restart: always
    env_file: !override
      - .env
      - .env.production
    ports: !reset []      # don't expose Postgres to the host in prod

  redis:
    restart: always
    env_file: !override
      - .env
      - .env.production
    ports: !reset []      # same for Redis
    
  node:
    build:
      target: prod
    restart: always
    volumes: !override # strip dev bind-mounts, run the built image as-is
      - ./logs:/app/logs
    env_file: !override
      - .env
      - .env.production
    environment:
      NODE_OPTIONS: ""    # clear the ESM test flag, not needed in prod

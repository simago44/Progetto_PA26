services:
  db:
    image: postgres:18
    # container_name: postgres_pa26
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT_CONTAINER}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:8
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_ARGS: --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}

  node:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT_CONTAINER}/${POSTGRES_DB}
      REDIS_URL: redis://${REDIS_PASSWORD}@redis:${REDIS_PORT}
      NODE_OPTIONS: "--experimental-vm-modules"
    ports:
      - ${NODE_PORT}:3000
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
      - ./logs:/app/logs
      - ./tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
